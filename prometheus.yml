global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "dco-exporter"
    static_configs:
      - targets: ["dco-exporter:8000"]
    scrape_interval: 15s
    scrape_timeout: 10s
    metrics_path: /metrics

  
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
