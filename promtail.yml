server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: dco-exporter
    static_configs:
      - targets:
          - localhost
        labels:
          job: dco-exporter
          __path__: /var/log/dco_exporter.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            message: message
      - labels:
          level:
      - output:
          source: message
